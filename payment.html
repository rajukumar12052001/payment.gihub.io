<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PayFlow Secure</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background:#0b0f1a;
  color:white;
  font-family:sans-serif;
}

/* Card */
.card {
  background:linear-gradient(135deg,#4f46e5,#06b6d4);
  padding:20px;
  border-radius:15px;
  color:white;
}

/* Input */
.input {
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  background:#111827;
  border:1px solid #374151;
}

/* Button */
.btn {
  width:100%;
  padding:12px;
  border-radius:10px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  font-weight:bold;
}
.btn:disabled {
  opacity:0.4;
}

/* Fraud alert */
#fraud-alert {
  display:none;
  background:#7f1d1d;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
}

/* Loader */
#loader {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}
</style>
</head>

<body class="p-4">

<h1 class="text-xl font-bold mb-4">💳 PayFlow Secure Payment</h1>

<!-- Card Preview -->
<div class="card mb-4">
  <p id="card-num">**** **** **** ****</p>
  <p id="card-name">YOUR NAME</p>
</div>

<!-- Amount -->
<input id="amount" class="input" type="number" placeholder="Enter Amount">

<!-- Method -->
<div class="flex gap-2 mt-3">
  <button onclick="setMethod('card')" class="btn">Card</button>
  <button onclick="setMethod('upi')" class="btn">UPI</button>
</div>

<!-- Card Form -->
<div id="card-form">
  <input id="card-number" class="input" placeholder="Card Number">
  <input id="card-name-input" class="input" placeholder="Name">
  <input id="cvv" class="input" placeholder="CVV">
</div>

<!-- UPI -->
<div id="upi-form" style="display:none;">
  <input id="upi" class="input" placeholder="yourname@upi">
</div>

<!-- Fraud Alert -->
<div id="fraud-alert">⚠️ Fraud Detected! Payment Blocked</div>

<!-- Pay Button -->
<button id="payBtn" onclick="pay()" class="btn mt-4" disabled>
  🔒 Pay Now
</button>

<!-- Loader -->
<div id="loader">
  <h2>Processing...</h2>
</div>

<script>
let method = "card";

/* Switch Method */
function setMethod(m){
  method = m;
  document.getElementById('card-form').style.display = m==='card'?'block':'none';
  document.getElementById('upi-form').style.display = m==='upi'?'block':'none';
  validate();
}

/* Live Card Preview */
document.getElementById('card-number').addEventListener('input', e=>{
  document.getElementById('card-num').innerText = e.target.value;
});
document.getElementById('card-name-input').addEventListener('input', e=>{
  document.getElementById('card-name').innerText = e.target.value;
});

/* Validation */
function validate(){
  let amount = document.getElementById('amount').value;
  let btn = document.getElementById('payBtn');

  if(!amount || amount<1){
    btn.disabled = true;
    return;
  }

  if(method==='card'){
    let num = document.getElementById('card-number').value;
    let cvv = document.getElementById('cvv').value;
    let name = document.getElementById('card-name-input').value;

    btn.disabled = !(num.length>=12 && cvv.length>=3 && name.length>2);
  } else {
    let upi = document.getElementById('upi').value;
    btn.disabled = !upi.includes('@');
  }
}

/* Attach validation */
document.querySelectorAll('input').forEach(i=>{
  i.addEventListener('input', validate);
});

/* Payment Logic */
function pay(){
  let amount = document.getElementById('amount').value;
  let fraud = false;

  // 🚨 Demo Fraud Detection
  if(amount > 50000) fraud = true;
  if(method==='upi' && document.getElementById('upi').value.includes('test')) fraud = true;

  if(fraud){
    document.getElementById('fraud-alert').style.display='block';
    alert("Fraud Detected!");
    return;
  }

  document.getElementById('fraud-alert').style.display='none';
  document.getElementById('loader').style.display='flex';

  setTimeout(()=>{
    document.getElementById('loader').style.display='none';
    alert("✅ Payment Successful!");
  },3000);
}
</script>

</body>
</html>
